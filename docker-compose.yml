services:
  db:
    image: postgres:16-alpine
    container_name: studbud-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studbud
      POSTGRES_PASSWORD: studbud_dev
      POSTGRES_DB: studbud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studbud"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
